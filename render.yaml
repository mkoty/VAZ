# Render.com Blueprint для автоматического деплоя
# Документация: https://render.com/docs/blueprint-spec

services:
  # Backend NestJS
  - type: web
    name: vaz-backend
    runtime: node
    region: frankfurt # Ближайший регион к России
    plan: free # Бесплатный план
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        fromDatabase:
          name: vaz-db
          property: connectionString

  # Frontend Next.js
  - type: web
    name: vaz-frontend
    runtime: node
    region: frankfurt
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: vaz-backend
          envVarKey: RENDER_EXTERNAL_URL

# PostgreSQL Database
databases:
  - name: vaz-db
    databaseName: lecar_db
    user: lecar_user
    plan: free # Бесплатный план PostgreSQL
    region: frankfurt
