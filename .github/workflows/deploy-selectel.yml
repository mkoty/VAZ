name: Deploy to Selectel

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Selectel VPS
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SELECTEL_HOST }}
          username: ${{ secrets.SELECTEL_USERNAME }}
          password: ${{ secrets.SELECTEL_PASSWORD }}
          port: ${{ secrets.SELECTEL_PORT || 22 }}
          script: |
            set -e

            echo "🔄 Обновление приложения VAZ..."

            cd /var/www/vaz

            # Обновление кода
            echo "📥 Получение последней версии из Git..."
            git pull

            # Обновление backend
            echo "📦 Обновление backend..."
            cd backend
            npm install
            npm run build
            pm2 restart vaz-backend

            # Обновление frontend
            echo "📦 Обновление frontend..."
            cd ..
            npm install
            npm run build
            pm2 restart vaz-frontend

            echo "✅ Деплой завершён!"
            echo ""
            echo "📊 Статус приложений:"
            pm2 status
